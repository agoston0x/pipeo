# Hetzner deployment for the entire CLAWPIPES stack:
#   • bee   — Swarm node (Bee 2.6.0)
#   • server — GSOC subscriber + ENS verifier + SQLite mirror + REST API
#   • web   — aggregator-live Next.js UI (reads from server's REST)
#
# Run from this directory:
#   cp .env.example .env
#   docker compose up -d
#
# Caddy on the host then reverse-proxies:
#   live.clawpipes.claws.page  → 127.0.0.1:3061  (UI)
#   api.clawpipes.claws.page   → 127.0.0.1:4070  (optional, for client/agents)

services:
  bee:
    image: ethersphere/bee:2.6.0
    container_name: clawpipes-bee
    restart: unless-stopped
    command: start
    environment:
      BEE_API_ADDR: ":1633"
      BEE_DEBUG_API_ENABLE: "true"
      BEE_DEBUG_API_ADDR: ":1635"
      BEE_PASSWORD: ${BEE_PASSWORD}
      BEE_BLOCKCHAIN_RPC_ENDPOINT: ${BEE_BLOCKCHAIN_RPC_ENDPOINT}
      BEE_GSOC_ENABLED: "true"
      BEE_CORS_ALLOWED_ORIGINS: "*"
      BEE_FULL_NODE: "false"
      BEE_NETWORK_ID: "1"
    volumes:
      - bee-data:/home/bee/.bee
    ports:
      - "127.0.0.1:1633:1633"
      - "127.0.0.1:1635:1635"

  server:
    build: ./server
    container_name: clawpipes-server
    restart: unless-stopped
    depends_on:
      - bee
    environment:
      PORT: 4070
      SWARM_URL: http://bee:1633
      GSOC_CHANNEL_NAME: ${GSOC_CHANNEL_NAME}
      ETH_RPC_URL: ${ETH_RPC_URL}
      ENS_SUFFIX: ${ENS_SUFFIX}
      SKIP_ENS: ${SKIP_ENS:-0}
      BEE_OVERLAY_ADDRESS: ${BEE_OVERLAY_ADDRESS}
      DATA_DIR: /var/lib/clawpipes
    volumes:
      - clawpipes-data:/var/lib/clawpipes
    ports:
      - "127.0.0.1:4070:4070"

  web:
    build: ./aggregator-live
    container_name: clawpipes-web
    restart: unless-stopped
    depends_on:
      - server
    environment:
      CLAWPIPES_API_URL: http://server:4070
      NODE_ENV: production
    ports:
      - "3061:3061"

volumes:
  bee-data:
  clawpipes-data:
