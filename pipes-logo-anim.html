<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>clawpipes — animated logo</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #030F1C;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: 
center;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: #fff;
  }
  .header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 24px;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), 
rgba(255,255,255,0));
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 6px;
  }
  canvas#logo {
    display: block;
    width: 36px; height: 36px;
  }
  .word { font-size: 15px; letter-spacing: 0.10em; font-weight: 
500; }
</style>
</head>
<body>
<div class="header">
  <canvas id="logo"></canvas>
  <span class="word">CLAWPIPES</span>
</div>
<script>
const canvas = document.getElementById('logo');
const ctx = canvas.getContext('2d');

/* Backing store at high DPR; internal coord system 0..SIZE */
const DISPLAY = 36;
const SIZE = 64;
const DPR = window.devicePixelRatio || 1;
canvas.width  = DISPLAY * DPR;
canvas.height = DISPLAY * DPR;
canvas.style.width  = DISPLAY + 'px';
canvas.style.height = DISPLAY + 'px';
ctx.scale((DISPLAY * DPR) / SIZE, (DISPLAY * DPR) / SIZE);

/* Geometry */
const cx = SIZE / 2, cy = SIZE / 2;
const R = SIZE * 0.30;          // circle radius
const PIPE_W = SIZE * 0.115;    // bar/pipe stroke width

const NUM_BARS = 4;
const BAR_GAP = SIZE * 0.055;
const TOTAL_W = NUM_BARS * PIPE_W + (NUM_BARS - 1) * BAR_GAP;
const BAR_X = i => cx - TOTAL_W/2 + PIPE_W/2 + i * (PIPE_W + 
BAR_GAP);

const BAR_BASE_Y = cy + SIZE * 0.30;
const BAR_MAX_H  = SIZE * 0.55;
const BAR_MIN_H  = SIZE * 0.18;

/* Gap between arcs — each arc shrinks from 90° to ARC_SPAN, 
leaving
   ARC_GAP_HALF of empty angle on each side, so rotation is 
easy to see. */
const ARC_GAP_HALF = 7 * Math.PI / 180;            // 7° 
padding per side
const ARC_SPAN     = Math.PI / 2 - 2 * ARC_GAP_HALF; // ~76°

const lerp = (a, b, t) => a + (b - a) * t;
const easeInOut = t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 
2, 3) / 2;

/* Sui blue → Sui pink across bar index */
function colorAt(frac) {
  const blue = [77, 162, 255], pink = [254, 139, 194];
  return [
    Math.round(lerp(blue[0], pink[0], frac)),
    Math.round(lerp(blue[1], pink[1], frac)),
    Math.round(lerp(blue[2], pink[2], frac)),
  ];
}

/* FFT amplitude per bar (0..1). damp ∈ [0,1] scales sine 
modulation;
   damp=0 yields static base heights (matches resting logo). */
function fftAmp(i, t, damp) {
  const base  = [0.55, 0.32, 0.82, 0.50][i];
  const freq  = [4.2,  7.1,  5.5,  6.3 ][i];
  const phase = [0.0,  1.2,  0.5,  2.0 ][i];
  const mod = 0.30 * Math.sin(t * freq + phase) + 0.12 * 
Math.sin(t * freq * 1.7 + phase);
  return Math.max(0.05, Math.min(1, base + damp * mod));
}

/* Timeline (one-shot, no looping):
     0.0– 2.5s  FFT bars
     2.5– 3.6s  morph to circle
     3.6– 5.6s  rotating circle (gap visible)
     5.6– 6.7s  morph back
     6.7– 9.2s  FFT bars (mirror of opening)
     9.2–10.2s  dampen — sine motion fades to 0
    10.2s+      STOP — bars frozen at resting heights */
function getState(t) {
  if (t < 2.5)  return { m: 0, damp: 1, done: false };
  if (t < 3.6)  return { m: easeInOut((t - 2.5) / 1.1), damp: 
1, done: false };
  if (t < 5.6)  return { m: 1, damp: 1, done: false };
  if (t < 6.7)  return { m: easeInOut((6.7 - t) / 1.1), damp: 
1, done: false };
  if (t < 9.2)  return { m: 0, damp: 1, done: false };
  if (t < 10.2) return { m: 0, damp: 1 - (t - 9.2), done: false 
};
  return { m: 0, damp: 0, done: true };
}

/* Constant slow rotation; visible only when morph > 0 */
function getRotation(t) { return t * 1.6; }

function drawBar(i, m, t, rot, damp) {
  const N = 28;
  const points = [];

  const amp = fftAmp(i, t, damp);
  const heightFFT = BAR_MIN_H + amp * (BAR_MAX_H - BAR_MIN_H);
  const ARC_LEN = R * ARC_SPAN;
  const heightMorph = lerp(heightFFT, ARC_LEN, m);

  // Bar i ↔ quarter arc, shrunk by ARC_GAP_HALF on each side 
so neighbours
  // don't quite touch — produces 4 visible gaps on the 
spinning ring.
  const angleStart = -3 * Math.PI / 4 + ARC_GAP_HALF + i * 
Math.PI / 2 + rot;
  const angleEnd   = angleStart + ARC_SPAN;

  for (let s = 0; s <= N; s++) {
    const u = s / N;

    // Bar mode: u=0 → tip (top), u=1 → base (baseline)
    const barX = BAR_X(i);
    const barY = BAR_BASE_Y - (1 - u) * heightMorph;

    // Arc mode: u=0 → arc start, u=1 → arc end (chains with 
neighbour)
    const angle = lerp(angleStart, angleEnd, u);
    const arcX = cx + R * Math.cos(angle);
    const arcY = cy + R * Math.sin(angle);

    points.push({
      x: lerp(barX, arcX, m),
      y: lerp(barY, arcY, m),
    });
  }

  const c = colorAt(i / (NUM_BARS - 1));

  // Glow
  ctx.shadowBlur = 6;
  ctx.shadowColor = `rgba(${c[0]},${c[1]},${c[2]},0.55)`;

  ctx.strokeStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
  ctx.lineWidth = PIPE_W;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let p = 1; p < points.length; p++) 
ctx.lineTo(points[p].x, points[p].y);
  ctx.stroke();

  ctx.shadowBlur = 0;

  // Specular highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.40)';
  ctx.lineWidth = PIPE_W * 0.22;
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let p = 1; p < points.length; p++) 
ctx.lineTo(points[p].x, points[p].y);
  ctx.stroke();
}

let startTime = null;
let stopped = false;
function frame(now) {
  if (stopped) return;
  if (!startTime) startTime = now;
  const t = (now - startTime) / 1000;

  ctx.clearRect(0, 0, SIZE, SIZE);
  const state = getState(t);
  const rot = getRotation(t);
  for (let i = 0; i < NUM_BARS; i++) drawBar(i, state.m, t, 
rot, state.damp);

  if (state.done) { stopped = true; return; }   // freeze on 
final frame
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
